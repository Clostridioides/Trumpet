<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trompeten-Studio</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0d0d1a">
<meta name="description" content="Dein Weg vom ersten Ton zum Amateur: Noten, Lieder, Langtöne, Jazz – alles mit Mikrofon.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trompete">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>



*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,serif;background:linear-gradient(145deg,#0d0d1a,#1a1a2e,#16213e);color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
.container{width:100%;max-width:440px;padding:16px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.6em;color:#f0c040;text-align:center;margin:18px 0 6px}
h2{font-size:1.08em;color:#f0c040;margin:12px 0 8px}
.subtitle{color:#aaa;font-size:0.85em;margin-bottom:18px;text-align:center}
.menu-section,.panel{width:100%;background:rgba(255,255,255,0.05);border-radius:12px;padding:14px;margin-bottom:14px}
.menu-section h2,.panel h2{margin-top:0}
.opt-grid{display:flex;flex-direction:column;gap:8px}
.inline-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.opt-btn{background:rgba(240,192,64,0.1);border:2px solid rgba(240,192,64,0.25);color:#e8e8e8;padding:12px;border-radius:10px;font-family:Georgia,serif;font-size:0.95em;cursor:pointer;transition:all 0.2s;text-align:left}
.opt-btn:hover{border-color:#f0c040;background:rgba(240,192,64,0.15)}
.opt-btn.selected{border-color:#f0c040;background:rgba(240,192,64,0.22);color:#f0c040;box-shadow:0 0 12px rgba(240,192,64,0.15)}
.opt-label{font-weight:bold}
.opt-desc{font-size:0.8em;color:#aaa;margin-top:2px}
.start-btn{width:100%;padding:14px;background:linear-gradient(135deg,#f0c040,#e0a020);color:#1a1a2e;font-family:Georgia,serif;font-size:1.1em;font-weight:bold;border:none;border-radius:12px;cursor:pointer;margin-top:10px;transition:transform 0.15s,box-shadow 0.15s}
.start-btn:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(240,192,64,0.3)}
.start-btn:disabled{opacity:0.4;cursor:default;transform:none;box-shadow:none}
.score-bar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:8px 4px;font-size:0.85em;color:#ccc;margin-bottom:4px}
.score-streak{color:#f0c040;font-weight:bold}.score-pct{color:#aaa}
svg.staff{width:100%;height:auto;margin:8px 0}
.note-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;margin:10px 0}
.note-btn{padding:12px 4px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:10px;color:#e8e8e8;font-family:Georgia,serif;font-size:1.05em;font-weight:bold;cursor:pointer;transition:all 0.2s}
.note-btn:hover{border-color:#f0c040;background:rgba(240,192,64,0.12)}
.note-btn.correct{background:rgba(34,197,94,0.25);border-color:#22c55e;color:#22c55e}
.note-btn.wrong{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:rgba(239,68,68,0.75)}
.note-btn.dimmed{opacity:0.35;pointer-events:none}.note-btn:disabled{cursor:default}
.ref-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(240,192,64,0.12);border:1.5px solid rgba(240,192,64,0.3);border-radius:8px;color:#f0c040;font-family:Georgia,serif;font-size:0.9em;cursor:pointer;transition:all 0.15s;margin:4px 0}
.ref-btn:hover{background:rgba(240,192,64,0.2)}
.mic-area{width:100%;text-align:center;margin:10px 0}
.mic-btn{padding:12px 20px;background:rgba(99,102,241,0.15);border:2px solid rgba(99,102,241,0.35);border-radius:12px;color:#a5b4fc;font-family:Georgia,serif;font-size:0.95em;cursor:pointer;transition:all 0.2s}
.mic-btn:hover{border-color:#6366f1;background:rgba(99,102,241,0.25)}
.mic-btn.recording{border-color:#ef4444;background:rgba(239,68,68,0.12);color:#fca5a5;animation:pulse-rec 1.2s infinite}
.mic-btn.connected{border-color:#22c55e;background:rgba(34,197,94,0.12);color:#86efac}
@keyframes pulse-rec{0%,100%{box-shadow:0 0 4px rgba(239,68,68,0.3)}50%{box-shadow:0 0 18px rgba(239,68,68,0.6)}}
.mic-status{margin-top:8px;font-size:0.85em;color:#a5b4fc}.mic-detected{font-size:1.25em;font-weight:bold;color:#c4b5fd;margin-top:6px}.mic-freq{font-size:0.75em;color:#888;margin-top:2px}
.rec-dot{display:inline-block;width:10px;height:10px;background:#ef4444;border-radius:50%;margin-right:6px;animation:pulse-rec 1.2s infinite}
.combo-status{width:100%;text-align:center;font-size:0.95em;margin:8px 0;color:#ccc}
.feedback{width:100%;text-align:center;padding:14px;border-radius:10px;margin:10px 0;font-size:1em;font-weight:bold}
.feedback.correct{background:rgba(34,197,94,0.15);color:#22c55e;border:1.5px solid rgba(34,197,94,0.3)}
.feedback.wrong{background:rgba(239,68,68,0.15);color:#ef4444;border:1.5px solid rgba(239,68,68,0.3)}
.nav-row{display:flex;gap:10px;width:100%;margin-top:10px}
.nav-btn{flex:1;padding:12px;border-radius:10px;font-family:Georgia,serif;font-size:0.95em;cursor:pointer;border:none;transition:all 0.15s}
.nav-btn.next{background:linear-gradient(135deg,#f0c040,#e0a020);color:#1a1a2e;font-weight:bold}.nav-btn.next:hover{transform:scale(1.02)}
.nav-btn.back{background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);color:#ccc}.nav-btn.back:hover{border-color:#f0c040;color:#f0c040}
.meta{font-size:0.78em;color:#aaa;line-height:1.45;margin-top:8px}.small{font-size:0.78em;color:#aaa}
.tuner-wrap{margin-top:10px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.04)}
.tuner-note{font-size:1.9em;font-weight:bold;color:#f0c040;text-align:center}
.tuner-sub{font-size:0.82em;color:#bbb;text-align:center;margin-top:2px}
.tuner-meter{position:relative;width:100%;height:54px;margin-top:10px}
.tuner-scale{position:absolute;left:0;right:0;top:24px;height:2px;background:rgba(255,255,255,0.2)}
.tuner-center{position:absolute;left:50%;top:14px;width:2px;height:22px;background:#f0c040;transform:translateX(-50%)}
.tuner-tick{position:absolute;top:18px;width:1px;height:12px;background:rgba(255,255,255,0.18)}
.tuner-needle{position:absolute;top:8px;width:3px;height:32px;background:#a5b4fc;border-radius:2px;left:50%;transform:translateX(-50%)}
.warning{width:100%;font-size:0.8em;color:#fca5a5;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);padding:10px;border-radius:10px;margin-top:10px;line-height:1.4}
.opt-btn,.note-btn,.ref-btn,.nav-btn,.start-btn{-webkit-tap-highlight-color:transparent;user-select:none}
.opt-btn:active,.note-btn:active,.ref-btn:active,.nav-btn:active,.start-btn:active{transform:scale(0.97)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.container>*{animation:fadeIn 0.18s ease}
.feedback{animation:fadeIn 0.22s ease}

/* ===== v2: journey, studios, songs, gamification ===== */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.mode-card{background:rgba(240,192,64,0.07);border:1.5px solid rgba(240,192,64,0.2);border-radius:12px;padding:11px 10px;cursor:pointer;transition:all .18s;text-align:left;-webkit-tap-highlight-color:transparent}
.mode-card:hover{border-color:#f0c040;background:rgba(240,192,64,0.13)}
.mode-card:active{transform:scale(.97)}
.mode-card.selected{border-color:#f0c040;background:rgba(240,192,64,0.18);box-shadow:0 0 12px rgba(240,192,64,0.12)}
.mode-card .mc-icon{font-size:1.35em;line-height:1}
.mode-card .mc-name{font-weight:bold;margin-top:4px;font-size:.93em}
.mode-card .mc-desc{font-size:.73em;color:#aaa;margin-top:2px;line-height:1.35}
.hero{width:100%;background:linear-gradient(135deg,rgba(240,192,64,.16),rgba(240,192,64,.04));border:1.5px solid rgba(240,192,64,.45);border-radius:14px;padding:14px;margin-bottom:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hero:active{transform:scale(.985)}
.hero .hero-kicker{font-size:.7em;letter-spacing:.14em;text-transform:uppercase;color:#c9b26a}
.hero h2{margin:4px 0 2px;font-size:1.2em;color:#fff}
.hero .hero-station{color:#f0c040;font-weight:bold;font-size:.92em}
.bar{width:100%;height:8px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#e0a020,#f0c040);border-radius:6px;transition:width .4s}
.today-row{display:flex;gap:8px;width:100%;margin-bottom:12px}
.today-chip{flex:1;background:rgba(255,255,255,.05);border-radius:10px;padding:8px 4px;text-align:center}
.today-chip b{display:block;color:#f0c040;font-size:1.05em}
.today-chip span{font-size:.66em;color:#999}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:8px 0;width:100%}
.chip{padding:7px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#ddd;font-family:Georgia,serif;font-size:.86em;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.chip.selected{border-color:#f0c040;background:rgba(240,192,64,.2);color:#f0c040;font-weight:bold}
.chip:active{transform:scale(.95)}
.canvas-frame{width:100%;background:rgba(0,0,0,.28);border:1.5px solid rgba(240,192,64,.25);border-radius:12px;overflow:hidden;margin:8px 0}
.canvas-frame canvas{display:block;width:100%}
.big-timer{font-size:2.3em;font-weight:bold;color:#f0c040;text-align:center;font-variant-numeric:tabular-nums;min-height:1.2em}
.result-card{width:100%;background:rgba(34,197,94,.1);border:1.5px solid rgba(34,197,94,.35);border-radius:12px;padding:12px;margin:8px 0;text-align:center}
.result-card .rc-row{display:flex;justify-content:space-around;margin-top:6px}
.result-card .rc-row b{color:#f0c040;font-size:1.1em;display:block}
.result-card .rc-row span{font-size:.68em;color:#aaa}
.why-line{width:100%;font-size:.78em;color:#c9b26a;background:rgba(240,192,64,.06);border-left:3px solid rgba(240,192,64,.5);padding:8px 10px;border-radius:0 8px 8px 0;margin:6px 0;line-height:1.45;font-style:italic}
.station{display:flex;gap:10px;padding:11px;border-radius:12px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);margin-bottom:9px;position:relative}
.station.done{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.07)}
.station.active{border-color:#f0c040;background:rgba(240,192,64,.08);box-shadow:0 0 14px rgba(240,192,64,.1)}
.station.lockd{opacity:.45}
.station .st-icon{font-size:1.4em;flex:0 0 32px;text-align:center}
.station .st-body{flex:1;min-width:0}
.station .st-name{font-weight:bold;font-size:.94em}
.station .st-desc{font-size:.75em;color:#aaa;margin-top:2px;line-height:1.35}
.station .st-goal{font-size:.72em;color:#c9b26a;margin-top:4px}
.path-line .station:not(:last-child)::after{content:'';position:absolute;left:26px;bottom:-10px;width:2px;height:10px;background:rgba(240,192,64,.3)}
.phase-h{width:100%;display:flex;justify-content:space-between;align-items:baseline;margin:14px 0 6px;color:#f0c040}
.phase-h .ph-n{font-size:.7em;letter-spacing:.12em;text-transform:uppercase;color:#c9b26a}
.toast-wrap{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:min(92vw,420px)}
.toast{background:#1a1a2e;border:1.5px solid #f0c040;color:#f0c040;padding:10px 16px;border-radius:12px;font-family:Georgia,serif;font-size:.9em;box-shadow:0 6px 24px rgba(0,0,0,.5);animation:toastIn .3s ease;text-align:center}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.song-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;background:rgba(0,0,0,.15);border-radius:10px}
.lvl-wrap{width:100%;height:7px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden;margin-top:8px}
.lvl-wrap>i{display:block;height:100%;background:linear-gradient(90deg,#6366f1,#a5b4fc);border-radius:5px;transition:width .09s linear}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-top:8px}
.ach{background:rgba(255,255,255,.05);border-radius:10px;padding:8px;display:flex;gap:8px;align-items:center}
.ach.locked{opacity:.38;filter:grayscale(1)}
.ach .a-i{font-size:1.25em}
.ach .a-n{font-size:.76em;font-weight:bold;line-height:1.2}
.ach .a-d{font-size:.64em;color:#999;line-height:1.25}
#confetti-c{position:fixed;inset:0;pointer-events:none;z-index:70}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}



</style>
</head>
<body>
<div class="container" id="app"></div>
<script>

var S = {
  screen: 'menu',
  lang: 'de',
  quizType: 'single', // single | jazz
  difficulty: 'easy',
  mode: 'click', // for single only
  transposition: 'Bb',
  concertA: 442,
  tuningTargetWrittenMidi: 67,
  toleranceMode: 'normal',
  autoAdvance: true,

  round: 0,
  correctCount: 0,
  totalCount: 0,
  streak: 0,

  currentNote: null,

  answered: false,
  clickAnswer: null,
  micAnswer: null,
  clickCorrect: null,
  micCorrect: null,

  micListening: false,
  micConnected: false,
  micDetectedName: '',
  micDetectedWritten: '',
  micDetectedFreq: 0,
  micDetectedCents: 0,
  stableCount: 0,
  lastMidi: -1,
  micLocked: false,
  showFingering: false,
  permissionHint: '',

  setupTuningPhase: false,
  setupTuned: false,
  tuningStableCount: 0,

  micResumeAfterReference: false,
  refPlaybackUntil: 0,

  autoAdvanceTimer: null,
  showSettings: false,
  showStats: false,
  adaptive: true,
  metronome: true,

  // long-term progress (note quiz + ear training)
  stats: { perNote:{}, xp:0, totalSeen:0, totalCorrect:0, bestStreak:0, byDay:{}, lastPlayed:null },

  // ---- Jazz path ----
  jazzTrack: 'blues',
  jazzLessonId: null,
  jazzPhrase: [],
  jazzStep: 0,
  jazzDoneStep: 0,
  jazzMode: 'listen',   // listen | play
  jazzTempo: 70,
  jazzSwing: false,
  jazzPlaying: false,
  jazzShowNames: true,
  jazzMatchCount: 0,
  jazzWaitRelease: false,
  jazzReleaseCount: 0,
  jazzCompleted: false,
  jazzOnTarget: false,
  jazzTiming: null,
  jazzProgress: {},

  // ---- v2 additions ----
  jazzBack: null,        // where the phrase screen goes back to
  customLesson: null,    // synthetic lesson (lip slurs / scale workshop)
  customLabel: '',
  fromJourney: null,     // station id that launched the current exercise

  micLevel: 0,           // raw RMS of the mic signal
  micLevelSm: 0,         // smoothed level for meters

  // songs
  songId: null,
  songPhrase: [],
  songStep: 0,
  songDoneStep: 0,
  songMode: 'listen',    // listen | play
  songTempo: 90,
  songPlaying: false,
  songCompleted: false,
  songMatch: 0,
  songWaitRel: false,
  songRelCount: 0,
  songProgress: {},

  // echo game
  echo: { level: 1, wins: 0, best: 0 },
  echoSeq: [],
  echoInput: [],
  echoPhase: 'idle',     // idle | listen | play | win | fail
  echoMatch: 0,
  echoWaitRel: false,
  echoRelCount: 0,

  // long tones & dynamics (personal bests)
  lt: { best: {}, bestAny: 0 },
  dyn: { best: {} },

  // guided path & achievements
  journey: { done: {}, cnt: {} },
  achieved: {}
};

// ---- Settings persistence ----
var PERSIST_KEYS = ['lang','difficulty','mode','transposition','concertA','tuningTargetWrittenMidi','toleranceMode','autoAdvance','adaptive','metronome','stats','jazzProgress','songProgress','echo','lt','dyn','journey','achieved','songTempo'];
function saveSettings() {
  try {
    var o = {};
    PERSIST_KEYS.forEach(function(k){ o[k] = S[k]; });
    localStorage.setItem('trumpetQuiz', JSON.stringify(o));
  } catch(e) {}
}
function loadSettings() {
  try {
    var raw = localStorage.getItem('trumpetQuiz');
    if (!raw) return;
    var o = JSON.parse(raw);
    PERSIST_KEYS.forEach(function(k){ if (o[k] !== undefined) S[k] = o[k]; });
  } catch(e) {}
}

var TRANS = {
  'Bb': {label_de:'B-Trompete', label_en:'B♭ trumpet', semitones:-2, desc_de:'klingt einen Ganzton tiefer', desc_en:'sounds a whole step lower'},
  'C':  {label_de:'C-Trompete', label_en:'C trumpet', semitones:0, desc_de:'klingt wie notiert', desc_en:'sounds as written'},
  'Eb': {label_de:'Es-Trompete', label_en:'E♭ trumpet', semitones:3, desc_de:'klingt eine kleine Terz höher', desc_en:'sounds a minor third higher'}
};

var DIFF = {
  veryeasy:{label_de:'1 · Sehr leicht', label_en:'1 · Very easy', desc_de:"C' – G' (5 Stammtöne)", desc_en:"C' – G' (5 natural notes)", min:60, max:67, chromatic:false},
  easy:    {label_de:'2 · Leicht', label_en:'2 · Easy', desc_de:"C' – C'' (8 Stammtöne)", desc_en:"C' – C'' (8 natural notes)", min:60, max:72, chromatic:false},
  medium:  {label_de:'3 · Mittel', label_en:'3 · Medium', desc_de:"C' – G'' (12 Stammtöne)", desc_en:"C' – G'' (12 natural notes)", min:60, max:79, chromatic:false},
  hard:    {label_de:'4 · Schwer', label_en:'4 · Hard', desc_de:"C' – C''' (15 Stammtöne)", desc_en:"C' – C''' (15 natural notes)", min:60, max:84, chromatic:false},
  expert:  {label_de:'5 · Profi', label_en:'5 · Expert', desc_de:"chromatisch C' – C'''", desc_en:"chromatic C' – C'''", min:60, max:84, chromatic:true}
};

var MODES = {
  click: {label_de:'Notennamen klicken', label_en:'Click note names', desc_de:'Erkenne die Note und klicke den Namen', desc_en:'Recognize the note and click its name'},
  mic:   {label_de:'Ton spielen (Mikrofon)', label_en:'Play the note (microphone)', desc_de:'Spiele die notierte Note auf deiner Trompete', desc_en:'Play the written note on your trumpet'},
  both:  {label_de:'Beides', label_en:'Both', desc_de:'Name klicken und Ton spielen', desc_en:'Click the name and play the note'}
};

var TOLERANCE = {
  // Mittlere Tonerkennung: nicht mehr über-permissiv, aber noch etwas verzeihender als ganz streng.
  strict: {tuningStable:18, answerStable:14, tuningCents:12, answerCents:30},
  normal: {tuningStable:14, answerStable:10, tuningCents:18, answerCents:42},
  relaxed:{tuningStable:10, answerStable:7,  tuningCents:24, answerCents:55}
};

var ROOTS = [
  {id:'C',  letter:0, accidental:0,  baseMidi:60, label_de:'C',  label_en:'C'},
  {id:'G',  letter:4, accidental:0,  baseMidi:67, label_de:'G',  label_en:'G'},
  {id:'D',  letter:1, accidental:0,  baseMidi:62, label_de:'D',  label_en:'D'},
  {id:'A',  letter:5, accidental:0,  baseMidi:69, label_de:'A',  label_en:'A'},
  {id:'E',  letter:2, accidental:0,  baseMidi:64, label_de:'E',  label_en:'E'},
  {id:'H',  letter:6, accidental:0,  baseMidi:71, label_de:'H',  label_en:'B'},
  {id:'F',  letter:3, accidental:0,  baseMidi:65, label_de:'F',  label_en:'F'},
  {id:'B',  letter:6, accidental:-1, baseMidi:70, label_de:'B',  label_en:'Bb'},
  {id:'Es', letter:2, accidental:-1, baseMidi:63, label_de:'Es', label_en:'Eb'},
  {id:'As', letter:5, accidental:-1, baseMidi:68, label_de:'As', label_en:'Ab'}
];

var SCALE_TYPES = {
  major:      {name_de:'Dur', name_en:'Major', intervals:[0,2,4,5,7,9,11,12], letterSteps:[0,1,2,3,4,5,6,7]},
  naturalMin: {name_de:'Natürlich Moll', name_en:'Natural minor', intervals:[0,2,3,5,7,8,10,12], letterSteps:[0,1,2,3,4,5,6,7]},

function baseNoteByMidi(midi) {
  for (var i=0;i<BASE_NOTES.length;i++) if (BASE_NOTES[i].midi === midi) return BASE_NOTES[i];
  return null;
}
// Build a full note object (sounding data + notation + fingering) from a written MIDI.
function phraseNote(midi) {
  var b = baseNoteByMidi(midi);
  if (b) return noteWithSoundingData(b);
  // Fallback for any midi outside the table: derive minimal data.
  var pc = ((midi % 12) + 12) % 12;
  var sharpSpell = {0:'C',1:'Cis',2:'D',3:'Es',4:'E',5:'F',6:'Fis',7:'G',8:'As',9:'A',10:'B',11:'H'};
  var accMap = {1:'sharp',3:'flat',6:'sharp',8:'flat',10:'flat'};
  var n = { name:sharpSpell[pc], midi:midi, display:'', staffPos:(midi-64), acc:accMap[pc]||'', chromatic:!!accMap[pc], fing:inferFingering(midi) };
  return noteWithSoundingData(n);
}
function buildJazzPhrase(lesson) {
  return lesson.notes.map(function(m){ return phraseNote(m); });
}
function getJazzLesson(track, id) {
  var t = JAZZ_TRACKS[track]; if (!t) return null;
  for (var i=0;i<t.lessons.length;i++) if (t.lessons[i].id === id) return t.lessons[i];
  return null;
}
function jazzLessonUnlocked(track, idx) {
  // Alle Lektionen/Level sind sofort frei wählbar.
  return true;
}

function pickRandomSingleNote() {

  }

function playTone(freq, dur) {
  var ctx = ensureAudioCtx(), t = ctx.currentTime;

  master.gain.linearRampToValueAtTime(0.22, t + 0.2);
  master.gain.setValueAtTime(0.22, t + sustain);
  master.gain.exponentialRampToValueAtTime(0.001, end);
  master.connect(ctx.destination);
  var harmonics = [{n:1,amp:1,type:'sawtooth'},{n:2,amp:0.58,type:'sine'},{n:3,amp:0.38,type:'sine'},{n:4,amp:0.22,type:'sine'},{n:5,amp:0.14,type:'sine'},{n:6,amp:0.08,type:'sine'}];

    osc.type = h.type;

    var amp = h.amp * 0.18;

    g.gain.setValueAtTime(amp * 0.84, t + 0.22);
    g.gain.setValueAtTime(amp * 0.76, t + sustain);
    g.gain.exponentialRampToValueAtTime(0.001, end);

}

function freqToMidiFloat(freq) { return 69 + 12 * Math.log2(freq / S.concertA); }

function detectPitch() {
  if (!S.micListening || !micAnalyser || S.micLocked) return;
  if (Date.now() < S.refPlaybackUntil) {
    micRafId = requestAnimationFrame(detectPitch);
    return;
  }

  var buf = new Float32Array(micAnalyser.fftSize);
  micAnalyser.getFloatTimeDomainData(buf);
  var _r = 0;
  for (var _i = 0; _i < buf.length; _i++) _r += buf[_i] * buf[_i];
  S.micLevel = Math.sqrt(_r / buf.length);
  S.micLevelSm = S.micLevelSm * 0.7 + S.micLevel * 0.3;
  var freq = autoCorrelate(buf, micCtx.sampleRate);

  if (!(freq > 0 && freq > 110 && freq < 1500)) {
    S.micDetectedName = '';
    S.micDetectedWritten = '';
    S.micDetectedFreq = 0;
    S.micDetectedCents = 0;
    if (S.screen === 'setup' && S.setupTuningPhase) S.tuningStableCount = 0;
    else { S.stableCount = 0; S.lastMidi = -1; if (typeof jazzOnNoPitch === 'function') jazzOnNoPitch(); }
    if (S.screen === 'longtone') { ltFrame(0); micRafId = requestAnimationFrame(detectPitch); return; }
    if (S.screen === 'dynamik')  { dynFrame(0); micRafId = requestAnimationFrame(detectPitch); return; }
    if (S.screen === 'song')     { songOnNoPitch(); renderMicDisplay(tr('tuningWaiting')); micRafId = requestAnimationFrame(detectPitch); return; }
    if (S.screen === 'echo')     { echoOnNoPitch(); micRafId = requestAnimationFrame(detectPitch); return; }
    renderMicDisplay(tr('tuningWaiting'));
    micRafId = requestAnimationFrame(detectPitch);
    return;
  }

  S.micDetectedFreq = Math.round(freq);
  rangeTrack(freq);

  if (S.screen === 'longtone') { ltFrame(freq); micRafId = requestAnimationFrame(detectPitch); return; }
  if (S.screen === 'dynamik')  { dynFrame(freq); micRafId = requestAnimationFrame(detectPitch); return; }
  if (S.screen === 'song')     { songDetect(freq); micRafId = requestAnimationFrame(detectPitch); return; }
  if (S.screen === 'echo')     { echoDetect(freq); micRafId = requestAnimationFrame(detectPitch); return; }

  if (S.screen === 'setup' && S.setupTuningPhase) {
    var tuningTarget = getTuningNote();
    S.micDetectedName = tuningTarget.name;
    S.micDetectedWritten = tuningTarget.display;
    S.micDetectedCents = centsOff(freq, tuningTarget.soundingMidi);
    if (Math.abs(S.micDetectedCents) <= tol().tuningCents) S.tuningStableCount++;
    else S.tuningStableCount = 0;
    renderMicDisplay(tr('tuningHold'), S.tuningStableCount, tol().tuningStable);
    if (S.tuningStableCount >= tol().tuningStable) {
      S.setupTuningPhase = false;
      S.setupTuned = true;
      pauseListening();
      render();
      return;
    }
    micRafId = requestAnimationFrame(detectPitch);
    return;
  }

  if (S.screen === 'jazz' && typeof jazzDetect === 'function') {
    if (jazzDetect(freq)) { micRafId = requestAnimationFrame(detectPitch); return; }
  }

  if (S.screen === 'tuner') {
    var sMidi = midiToRounded(freq);          // nearest sounding (concert) pitch
    var spell = chromaticSpell(sMidi);
    S.micDetectedName = spell.name;
    S.micDetectedWritten = '';
    S.micDetectedCents = centsOff(freq, sMidi);
    var writtenSpell = chromaticSpell(sMidi - TRANS[S.transposition].semitones);
    renderMicDisplay(tr('written') + ': ' + localizedNoteName(writtenSpell.name) + ' · ' + tr('octave') + ' ' + spell.octave);
    micRafId = requestAnimationFrame(detectPitch);
    return;
  }

  var midi = midiToRounded(freq);
  var mapped = findWrittenNoteBySoundingMidi(midi);

  if (mapped) {
    S.micDetectedName = mapped.name;
    S.micDetectedWritten = mapped.display;
    S.micDetectedCents = centsOff(freq, mapped.soundingMidi);
    if (midi === S.lastMidi) S.stableCount++;
    else { S.stableCount = 1; S.lastMidi = midi; }
  } else {
    S.micDetectedName = '';
    S.micDetectedWritten = '';
    S.micDetectedCents = 0;
    S.stableCount = 0;
    S.lastMidi = -1;
  }

  if (S.screen === 'quiz' && S.quizType === 'single' && S.mode !== 'click' && !S.micLocked) {
    renderMicDisplay(tr('tuningHold'), S.stableCount, tol().answerStable);
    if (mapped && S.currentNote && midi === S.currentNote.soundingMidi && Math.abs(S.micDetectedCents) <= tol().answerCents && S.stableCount >= tol().answerStable) {
      S.micLocked = true;
      S.micAnswer = mapped.name;
      S.micCorrect = (mapped.midi === S.currentNote.midi);
      pauseListening();
      if (S.mode === 'mic') handleMicOnlyAnswer();
      else checkBothDone();
      render();
      return;
    }
    micRafId = requestAnimationFrame(detectPitch);
    return;
  }

  renderMicDisplay(tr('tuningWaiting'));
  micRafId = requestAnimationFrame(detectPitch);
}

function checkBothDone() {

    S.answered = true;
    var ok = S.clickCorrect && S.micCorrect;
    if (ok) S.streak++; else S.streak = 0;
    S.totalCount++; if (ok) S.correctCount++;
    recordAnswer(S.currentNote, ok);
    render();

    if (off > bm / 2) off -= bm;

    S.jazzTiming = { ms: Math.round(off), label: lbl };
  }
  S.jazzMatchCount = 0;
  S.jazzOnTarget = false;
  S.jazzDoneStep = Math.max(S.jazzDoneStep, S.jazzStep + 1);
  if (S.jazzStep >= S.jazzPhrase.length - 1) {
    S.jazzWaitRelease = false;

function jazzDetect(freq) {

  var mapped = findWrittenNoteBySoundingMidi(midi);
  S.micDetectedFreq = Math.round(freq);

  S.micDetectedWritten = mapped ? mapped.display : '';

  // tone or a repeated pitch can't roll through several notes at once.

  var onTarget = (midi === cur.soundingMidi) && (Math.abs(S.micDetectedCents) <= tol().answerCents);

  if (onTarget) {
    S.jazzMatchCount++;

// ---- feedback sounds & haptics ----
function playFeedback(ok) {
  try {
    var ctx = ensureAudioCtx(), t = ctx.currentTime;
    if (ok) {
      [880, 1318].forEach(function(f, i){
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0.0001, t + i * 0.09);
        g.gain.linearRampToValueAtTime(0.11, t + i * 0.09 + 0.015);
        g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.09 + 0.22);
        o.connect(g); g.connect(ctx.destination);
        o.start(t + i * 0.09); o.stop(t + i * 0.09 + 0.25);
      });
    } else {
      var o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.type = 'triangle';
      o2.frequency.setValueAtTime(180, t);
      o2.frequency.exponentialRampToValueAtTime(120, t + 0.18);
      g2.gain.setValueAtTime(0.0001, t);
      g2.gain.linearRampToValueAtTime(0.13, t + 0.01);
      g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
      o2.connect(g2); g2.connect(ctx.destination);
      o2.start(t); o2.stop(t + 0.25);
    }
  } catch(e) {}
  try { if (navigator.vibrate) navigator.vibrate(ok ? 25 : [40, 50, 40]); } catch(e) {}
}
function playFanfare() {
  try {
    var semi = TRANS[S.transposition].semitones;
    [72, 76, 79, 84].forEach(function(m, i){
      setTimeout(function(){ playTone(midiToFreq(m + semi), 0.26); }, i * 130);
    });
  } catch(e) {}
  try { if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 120]); } catch(e) {}
}
function toast(msg) {
  var w = document.getElementById('toast-wrap');
  if (!w) { w = document.createElement('div'); w.id = 'toast-wrap'; w.className = 'toast-wrap'; document.body.appendChild(w); }
  var el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
  w.appendChild(el);
  setTimeout(function(){
    el.style.transition = 'opacity .4s'; el.style.opacity = '0';
    setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 420);
  }, 3400);
}
function confetti() {
  try { if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return; } catch(e) {}
  var c = document.getElementById('confetti-c');
  if (!c) { c = document.createElement('canvas'); c.id = 'confetti-c'; document.body.appendChild(c); }
  c.width = window.innerWidth; c.height = window.innerHeight;
  var ctx = c.getContext('2d'), P = [], cols = ['#f0c040', '#e0a020', '#fff5d6', '#22c55e', '#a5b4fc'];
  for (var i = 0; i < 90; i++) P.push({
    x: window.innerWidth / 2 + (Math.random() - 0.5) * 140,
    y: window.innerHeight * 0.35,
    vx: (Math.random() - 0.5) * 7, vy: -Math.random() * 7 - 3,
    r: 3 + Math.random() * 4, c: cols[i % cols.length], s: Math.random() * Math.PI
  });
  var t0 = Date.now();
  (function step(){
    var dt = (Date.now() - t0) / 1000;
    ctx.clearRect(0, 0, c.width, c.height);
    var a = Math.max(0, 1 - dt / 1.5);
    P.forEach(function(p){
      p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.s += 0.1;
      ctx.save(); ctx.globalAlpha = a; ctx.translate(p.x, p.y); ctx.rotate(p.s);
      ctx.fillStyle = p.c; ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r); ctx.restore();
    });
    if (dt < 1.6) requestAnimationFrame(step); else ctx.clearRect(0, 0, c.width, c.height);
  })();
}

function computeDayStreak() {

  function key(dt){ return dt.toISOString().slice(0, 10); }
  if (!days[key(d)]) d.setDate(d.getDate() - 1); // grace: a streak survives until tomorrow
  while (days[key(d)]) { n++; d.setDate(d.getDate() - 1); }

}

function stationList() {
  var out = [];
  JOURNEY.forEach(function(p){ p.stations.forEach(function(s){ out.push(s); }); });
  return out;
}
function stationIndex(id) {
  var L = stationList();
  for (var i = 0; i < L.length; i++) if (L[i].id === id) return i;
  return -1;
}
function stationUnlocked(id) {
  var i = stationIndex(id);
  if (i <= 0) return true;
  return !!S.journey.done[stationList()[i - 1].id];
}
function stationProgress(st) {
  var m = st.m;
  if (S.journey.done[st.id]) return { done: true, cur: 1, goal: 1 };
  if (m.t === 'quiz' || m.t === 'ear' || m.t === 'echo') {
    return { done: false, cur: Math.min(S.journey.cnt[st.id] || 0, m.n), goal: m.n };
  }
  if (m.t === 'lt') {
    var b = m.note ? (S.lt.best[m.note] || 0) : (S.lt.bestAny || 0);
    return { done: false, cur: Math.min(Math.floor(b), m.sec), goal: m.sec, unit: 's' };
  }
  if (m.t === 'dyn') {
    var bb = 0;
    for (var k in S.dyn.best) bb = Math.max(bb, S.dyn.best[k]);
    return { done: false, cur: Math.min(bb, m.score), goal: m.score, unit: '%' };
  }
  if (m.t === 'song') {
    var c = 0; m.ids.forEach(function(id){ if (S.songProgress[id]) c++; });
    return { done: false, cur: c, goal: m.ids.length };
  }
  if (m.t === 'lesson') {
    var c2 = 0; m.ids.forEach(function(id){ if (S.jazzProgress && S.jazzProgress[id]) c2++; });
    return { done: false, cur: c2, goal: m.ids.length };
  }
  if (m.t === 'range') return { done: false, cur: Math.min(rangeSpan(), m.semis), goal: m.semis };

}

  var changed = false, L = stationList();
  for (var i = 0; i < L.length; i++) {
    var st = L[i], m = st.m;
    if (S.journey.done[st.id] || !stationUnlocked(st.id)) continue;
    if (m.t === 'quiz' && ev.t === 'quiz' && ev.correct) {
      if (diffOrder(ev.diff) >= diffOrder(m.diff) && (m.mode === 'any' || ev.mode === 'mic' || ev.mode === 'both')) {
        S.journey.cnt[st.id] = (S.journey.cnt[st.id] || 0) + 1; changed = true;
      }
    } else if (m.t === 'ear' && ev.t === 'ear' && ev.correct) {
      S.journey.cnt[st.id] = (S.journey.cnt[st.id] || 0) + 1; changed = true;
    } else if (m.t === 'echo' && ev.t === 'echo') {
      S.journey.cnt[st.id] = (S.journey.cnt[st.id] || 0) + 1; changed = true;
    }
    var p = stationProgress(st);
    if (!p.done && p.cur >= p.goal) {
      S.journey.done[st.id] = true; changed = true;
      ensureStats().xp = (ensureStats().xp || 0) + 60;
      toast('🎉 ' + tr('stationToast') + ': ' + st['name_' + S.lang]);

  }

}
function journeyDoneCount() {

function nextStation() {

var LT = { active:false, targetWritten:null, lockedWritten:null, autoMidi:-1, autoCount:0,

}

}
function ltFinish() {
  var now = Date.now();
  var dur = (now - LT.holdStart) / 1000;
  LT.holding = false;
  if (dur >= 1 && LT.frames > 3) {
    var res = {
      dur: Math.round(dur * 10) / 10,
      calm: Math.round(LT.inBand / LT.frames * 100),
      dev: Math.round(LT.sumAbs / LT.frames)
    };
    LT.result = res;
    var name = null, b = baseNoteByMidi(LT.lockedWritten);
    if (b) name = b.name;
    if (name && res.dur > (S.lt.best[name] || 0)) S.lt.best[name] = res.dur;
    if (res.dur > (S.lt.bestAny || 0)) S.lt.bestAny = res.dur;
    ensureStats().xp = (ensureStats().xp || 0) + Math.min(20, Math.floor(res.dur));
    playFeedback(true);

    checkAchievements();

    render();
  }
}
function ltFrame(freq) {
  var now = Date.now();
  if (!LT.active) { ltDraw(); return; }
  var tSound = ltTargetSound();
  var c = null;
  if (freq > 0) {
    var midi = midiToRounded(freq);
    if (LT.targetWritten === null && LT.lockedWritten === null) {
      if (midi === LT.autoMidi) LT.autoCount++; else { LT.autoMidi = midi; LT.autoCount = 1; }
      if (LT.autoCount >= 6) {
        LT.lockedWritten = midi - TRANS[S.transposition].semitones;
        tSound = midi;
        var st = document.getElementById('lt-status');
        if (st) st.textContent = tr('ltHold');
      }
    }
    if (tSound !== null) {
      c = centsOff(freq, tSound);
      var voiced = S.micLevelSm > 0.011;
      var near = (midi === tSound) && Math.abs(c) <= 34;
      if (!LT.holding && near && voiced) {
        LT.holding = true; LT.holdStart = now; LT.frames = 0; LT.inBand = 0; LT.sumAbs = 0;
        LT.result = null;
      }
      if (LT.holding) {
        if (midi !== tSound) { ltFinish(); }
        else {
          LT.frames++;
          if (Math.abs(c) <= 25) LT.inBand++;
          LT.sumAbs += Math.abs(c);
          LT.lastVoiced = now;
        }
      }
    }
  } else {
    LT.autoCount = 0;
    if (LT.holding && now - LT.lastVoiced > 380) ltFinish();
  }
  LT.hist.push({ t: now, c: c, l: S.micLevelSm });
  while (LT.hist.length && now - LT.hist[0].t > 12000) LT.hist.shift();
  var tm = document.getElementById('lt-timer');
  if (tm) tm.textContent = LT.holding ? (((now - LT.holdStart) / 1000).toFixed(1) + ' s') : (LT.result ? LT.result.dur.toFixed(1) + ' s' : '0,0 s');
  var stEl = document.getElementById('lt-status');

}
function ltDraw() {
  var cv = document.getElementById('lt-canvas');
  if (!cv) return;
  var ctx = cv.getContext('2d'), W = cv.width, H = cv.height, now = Date.now();
  ctx.clearRect(0, 0, W, H);
  var pH = H - 26; // pitch area; bottom strip = breath level
  // in-tune band (±25 cents)
  var yOf = function(c){ return pH / 2 - (Math.max(-60, Math.min(60, c)) / 60) * (pH / 2 - 8); };
  ctx.fillStyle = 'rgba(240,192,64,0.10)';
  ctx.fillRect(0, yOf(25), W, yOf(-25) - yOf(25));
  ctx.strokeStyle = 'rgba(240,192,64,0.55)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, pH / 2); ctx.lineTo(W, pH / 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  [50, -50].forEach(function(g){ ctx.beginPath(); ctx.moveTo(0, yOf(g)); ctx.lineTo(W, yOf(g)); ctx.stroke(); });
  // breath level strip
  ctx.fillStyle = 'rgba(99,102,241,0.14)';
  ctx.fillRect(0, pH + 2, W, H - pH - 2);
  var xOf = function(t){ return W - (now - t) / 12000 * W; };
  // level area
  ctx.beginPath();
  ctx.moveTo(xOf(LT.hist.length ? LT.hist[0].t : now), H);
  LT.hist.forEach(function(p){ ctx.lineTo(xOf(p.t), H - Math.min(1, p.l * 9) * (H - pH - 4)); });
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = 'rgba(165,180,252,0.5)';
  ctx.fill();
  // pitch trace
  ctx.lineWidth = 2.4;
  var prev = null;
  LT.hist.forEach(function(p){
    if (p.c === null) { prev = null; return; }
    var x = xOf(p.t), y = yOf(p.c);
    if (prev) {
      ctx.strokeStyle = Math.abs(p.c) <= 25 ? '#22c55e' : (Math.abs(p.c) <= 45 ? '#f0c040' : '#ef4444');
      ctx.beginPath(); ctx.moveTo(prev.x, prev.y); ctx.lineTo(x, y); ctx.stroke();
    }
    prev = { x: x, y: y };
  });
}

// =========================================================================
//  DYNAMICS WAVE – shape the loudness of one held tone along a curve.
// =========================================================================
var DY = { shape:'cresc', phase:'idle', start:0, dur:6000, samples:[], score:null };
function goDyn() {
  clearAutoAdvance(); pauseListening(); clearJazzTimers(); clearSongTimers(); stopMetronome(); ltStop();
  DY.phase = 'idle'; DY.samples = []; DY.score = null;
  S.screen = 'dynamik'; render();
}
function dynStop() { if (DY.phase === 'run' || DY.phase === 'count') DY.phase = 'idle'; }
function dynShape(s) { DY.shape = s; DY.phase = 'idle'; DY.samples = []; DY.score = null; render(); }
function dynTarget(p) {
  if (DY.shape === 'cresc') return 0.12 + 0.88 * p;
  if (DY.shape === 'decresc') return 1 - 0.88 * p;
  return 0.12 + 0.88 * Math.sin(Math.PI * p);
}
function dynStart() {
  startMicListening();
  DY.phase = 'count'; DY.samples = []; DY.score = null;
  DY.dur = DY.shape === 'wave' ? 8000 : 6000;
  S.refPlaybackUntil = Date.now() + 1650;
  for (var i = 0; i < 3; i++) (function(k){ setTimeout(function(){ playClick(k === 0); }, k * 500); })(i);
  setTimeout(function(){
    if (S.screen !== 'dynamik') return;
    DY.phase = 'run'; DY.start = Date.now();
  }, 1550);
  render();
}
function dynFinish() {
  DY.phase = 'result';
  var mx = 0.02, voiced = 0;
  DY.samples.forEach(function(s){ if (s.l > mx) mx = s.l; if (s.l > 0.008) voiced++; });
  var err = 0, n = 0;
  DY.samples.forEach(function(s){
    if (s.l > 0.006) { err += Math.abs(s.l / mx - dynTarget(s.t / DY.dur)); n++; }
  });
  var cov = DY.samples.length ? voiced / DY.samples.length : 0;
  var score = n ? Math.round(Math.max(0, (1 - (err / n) * 1.6)) * 100 * Math.min(1, cov * 1.3)) : 0;
  DY.score = Math.min(100, score);
  if (DY.score > (S.dyn.best[DY.shape] || 0)) S.dyn.best[DY.shape] = DY.score;
  ensureStats().xp = (ensureStats().xp || 0) + Math.round(DY.score / 5);
  playFeedback(DY.score >= 60);
  journeyEvent({ t: 'dyn' });
  checkAchievements();
  saveSettings();
  render();
}
function dynFrame(freq) {
  if (DY.phase === 'run') {
    var t = Date.now() - DY.start;
    DY.samples.push({ t: t, l: S.micLevelSm });
    var el = document.getElementById('dyn-timer');
    if (el) el.textContent = Math.max(0, (DY.dur - t) / 1000).toFixed(1) + ' s';
    if (t >= DY.dur) { dynFinish(); return; }
  }
  dynDraw();
}
function dynDraw() {
  var cv = document.getElementById('dyn-canvas');
  if (!cv) return;
  var ctx = cv.getContext('2d'), W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  var pad = 10, iW = W - 2 * pad, iH = H - 2 * pad;
  var xy = function(p, v){ return [pad + p * iW, pad + (1 - v) * iH]; };
  // target band
  ctx.beginPath();
  for (var p = 0; p <= 1.001; p += 0.02) { var a = xy(p, Math.min(1, dynTarget(p) + 0.12)); p === 0 ? ctx.moveTo(a[0], a[1]) : ctx.lineTo(a[0], a[1]); }
  for (var q = 1; q >= -0.001; q -= 0.02) { var b = xy(q, Math.max(0, dynTarget(q) - 0.12)); ctx.lineTo(b[0], b[1]); }
  ctx.closePath();
  ctx.fillStyle = 'rgba(240,192,64,0.12)'; ctx.fill();
  // target line
  ctx.beginPath();
  for (var p2 = 0; p2 <= 1.001; p2 += 0.02) { var c = xy(p2, dynTarget(p2)); p2 === 0 ? ctx.moveTo(c[0], c[1]) : ctx.lineTo(c[0], c[1]); }

  if (DY.samples.length) {

    DY.samples.forEach(function(s){ if (s.l > mx) mx = s.l; });
    ctx.beginPath();
    DY.samples.forEach(function(s, i){
      var d = xy(Math.min(1, s.t / DY.dur), Math.min(1, s.l / mx));
      i === 0 ? ctx.moveTo(d[0], d[1]) : ctx.lineTo(d[0], d[1]);
    });
    ctx.strokeStyle = '#a5b4fc'; ctx.lineWidth = 2.5; ctx.stroke();
    if (DY.phase === 'run') {
      var lp = DY.samples[DY.samples.length - 1];
      var e = xy(Math.min(1, lp.t / DY.dur), Math.min(1, lp.l / mx));

      ctx.beginPath(); ctx.arc(e[0], e[1], 5, 0, Math.PI * 2); ctx.fill();
    }
  }
}
function renderDyn(app) {
  var h = '<h1>🌊 ' + tr('dynTitle') + '</h1>';
  h += '<div class="subtitle">' + tr('dynHint') + '</div>';

  h += '<div class="chip-row">';
  [['cresc','shapeCresc'],['decresc','shapeDecresc'],['wave','shapeWave']].forEach(function(pair){
    h += '<div class="chip' + (DY.shape === pair[0] ? ' selected' : '') + '" onclick="dynShape(\'' + pair[0] + '\')">' + tr(pair[1]) + '</div>';
  });

    var y = staffTop + i * ls;

  }

    if (noteY < topLineY - 0.5) for (var ly2 = topLineY - ls; ly2 >= noteY - 0.5; ly2 -= ls) out += '<line x1="' + (noteX - 13) + '" y1="' + ly2 + '" x2="' + (noteX + 13) + '" y2="' + ly2 + '" stroke="#555" stroke-width="1.2"/>';
    if (note.acc === 'sharp') out += '<text x="' + (noteX - 16) + '" y="' + (noteY + 6) + '" font-size="15" fill="' + fill + '" font-family="serif" text-anchor="middle">&#9839;</text>';
    else if (note.acc === 'flat') out += '<text x="' + (noteX - 16) + '" y="' + (noteY + 5) + '" font-size="17" fill="' + fill + '" font-family="serif" text-anchor="middle">&#9837;</text>';

    h += '<div class="nav-row"><button class="nav-btn back" onclick="songStepBack()">' + tr('stepBack') + '</button><button class="nav-btn next" onclick="songStepFwd()">' + tr('stepFwd') + '</button></div>';
  }
  h += '<div class="nav-row" style="margin-top:8px"><button class="nav-btn back" onclick="songBack()">' + (S.fromJourney ? tr('backJourney') : '← ' + tr('songsTitle')) + '</button></div>';
  app.innerHTML = h;
  var sc = document.getElementById('song-scroll');
  if (sc) sc.scrollLeft = Math.max(0, _songCurX - 150);
  if (S.songMode === 'play') renderMicDisplay(tr('yourTurn'), S.songMatch, tol().answerStable);
}

// =========================================================================
//  CUSTOM PHRASE LESSONS – lip slurs & scale workshop reuse the jazz screen.
// =========================================================================
function openCustomLesson(lesson, label, back, prebuiltPhrase) {
  clearAutoAdvance();
  pauseListening();
  clearJazzTimers();
  stopMetronome();
  S.customLesson = lesson;
  S.customLabel = label;
  S.jazzBack = back;
  S.jazzLessonId = lesson.id;
  S.jazzPhrase = prebuiltPhrase || buildJazzPhrase(lesson);
  S.jazzStep = 0;
  S.jazzDoneStep = 0;
  S.jazzTempo = lesson.tempo;
  S.jazzSwing = !!lesson.swing;
  S.jazzMode = 'listen';
  S.jazzPlaying = false;
  S.jazzCompleted = false;
  S.jazzMatchCount = 0;
  S.jazzWaitRelease = false;
  S.jazzReleaseCount = 0;
  S.jazzTiming = null;
  S.jazzOnTarget = false;
  S.screen = 'jazz';
  render();
}
function goFlexMenu() {
  clearAutoAdvance(); pauseListening(); clearJazzTimers(); clearSongTimers(); stopMetronome(); ltStop(); dynStop();
  S.screen = 'flexmenu'; render();
}
function openFlexLesson(id) {
  for (var i = 0; i < FLEX_LESSONS.length; i++) {
    if (FLEX_LESSONS[i].id === id) { openCustomLesson(FLEX_LESSONS[i], tr('flexTitle'), 'flexmenu'); return; }
  }
}
function renderFlexMenu(app) {
  var h = '<h1>🌀 ' + tr('flexTitle') + '</h1>';
  h += '<div class="subtitle">' + tr('flexHint') + '</div>';
  h += '<div class="why-line">' + tr('flexWhy') + '</div>';
  h += '<div class="menu-section"><div class="opt-grid">';
  FLEX_LESSONS.forEach(function(ls){
    var done = S.jazzProgress && S.jazzProgress[ls.id];
    h += '<div class="opt-btn" onclick="openFlexLesson(\'' + ls.id + '\')">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center">';
    h += '<div class="opt-label">' + tr('level') + ' ' + ls.level + ' · ' + ls['name_' + S.lang] + '</div>';
    h += done ? '<span style="color:#22c55e;font-weight:bold">&#10003;</span>' : '';
    h += '</div><div class="opt-desc">' + ls['desc_' + S.lang] + '</div></div>';
  });
  h += '</div></div>';
  h += '<div class="nav-row"><button class="nav-btn back" onclick="goMenu()">' + backLabel() + '</button></div>';
  app.innerHTML = h;
}

var wsRoot = 'C', wsScale = 'major';
function goScaleWs(root, scale) {
  clearAutoAdvance(); pauseListening(); clearJazzTimers(); clearSongTimers(); stopMetronome(); ltStop(); dynStop();
  if (root) wsRoot = root;
  if (scale) wsScale = scale;
  S.screen = 'scalews'; render();
}
function wsPickRoot(r) { wsRoot = r; render(); }
function wsPickScale(s) { wsScale = s; render(); }
function wsLessonId() { return 'sw_' + wsRoot + '_' + wsScale; }
function startScaleWs() {
  var up = buildTheoryScale(wsRoot, wsScale);
  var phrase = up.concat(up.slice(0, up.length - 1).reverse());
  var root = getRootById(wsRoot);
  var nm = root['label_' + S.lang] + (S.lang === 'de' ? '-' : ' ') + SCALE_TYPES[wsScale]['name_' + S.lang];
  var lesson = {
    id: wsLessonId(), level: 1, tempo: 76, swing: false,
    name_de: nm, name_en: nm,
    desc_de: tr('upDownLbl'), desc_en: tr('upDownLbl'),
    notes: []
  };
  openCustomLesson(lesson, tr('scaleWsTitle'), 'scalews', phrase);
}
function renderScaleWs(app) {
  var h = '<h1>🪜 ' + tr('scaleWsTitle') + '</h1>';
  h += '<div class="subtitle">' + tr('scaleWsHint') + '</div>';
  h += '<div class="why-line">' + tr('scaleWsWhy') + '</div>';
  h += '<div class="small" style="width:100%;text-align:left">' + tr('root') + ':</div>';
  h += '<div class="chip-row">';
  ROOTS.forEach(function(r){
    h += '<div class="chip' + (wsRoot === r.id ? ' selected' : '') + '" onclick="wsPickRoot(\'' + r.id + '\')">' + r['label_' + S.lang] + '</div>';
  });
  h += '</div>';
  h += '<div class="small" style="width:100%;text-align:left">' + tr('scaleType') + ':</div>';
  h += '<div class="chip-row">';
  Object.keys(SCALE_TYPES).forEach(function(k){
    h += '<div class="chip' + (wsScale === k ? ' selected' : '') + '" onclick="wsPickScale(\'' + k + '\')">' + SCALE_TYPES[k]['name_' + S.lang] + '</div>';
  });
  h += '</div>';
  var done = S.jazzProgress && S.jazzProgress[wsLessonId()];
  if (done) h += '<div class="small" style="text-align:center;color:#22c55e">&#10003; ' + tr('done') + '</div>';
  h += '<button class="start-btn" onclick="startScaleWs()">' + tr('practiceScale') + ' (' + tr('upDownLbl') + ')</button>';
  h += '<div class="nav-row" style="margin-top:10px"><button class="nav-btn back" onclick="goMenu()">' + backLabel() + '</button></div>';
  app.innerHTML = h;
}

document.addEventListener('keydown', function(e){
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if (S.screen === 'quiz') {
    if ((e.key === ' ' || e.key === 'Enter')) {
      e.preventDefault();
      if (S.answered) { clearAutoAdvance(); nextTask(); }
      else playRef();
      return;
    }
    if ((S.mode === 'click' || S.mode === 'both' || S.quizType === 'ear') && !S.answered && /^[1-9]$/.test(e.key)) {
      var names = getUniqueNames();
      var idx = parseInt(e.key, 10) - 1;
      if (idx < names.length) { answerClick(names[idx]); }
      return;
    }
    if (e.key === 'f' || e.key === 'F') { toggleFingering(); return; }
  }
});

loadSettings();
// v2: make sure newly added persisted structures have all fields
if (!S.echo || typeof S.echo.level !== 'number') S.echo = { level: 1, wins: 0, best: 0 };
if (!S.lt || !S.lt.best) S.lt = { best: {}, bestAny: 0 };
if (!S.dyn || !S.dyn.best) S.dyn = { best: {} };
if (!S.journey || !S.journey.done) S.journey = { done: {}, cnt: {} };
if (!S.journey.cnt) S.journey.cnt = {};
if (!S.songProgress) S.songProgress = {};
if (!S.achieved) S.achieved = {};
ensureStats();
startHeartbeat();
render();
try { checkAchievements(); } catch (e) {}
window.addEventListener('beforeunload', function(){ disconnectMic(); });

if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.protocol === 'http:')) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

</script>
