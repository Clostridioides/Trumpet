<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trompeten-Notenquiz</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0d0d1a">
<meta name="description" content="Noten lesen, spielen und Jazz-Phrasen lernen.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>



*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,serif;background:linear-gradient(145deg,#0d0d1a,#1a1a2e,#16213e);color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
.container{width:100%;max-width:440px;padding:16px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.6em;color:#f0c040;text-align:center;margin:18px 0 6px}
h2{font-size:1.08em;color:#f0c040;margin:12px 0 8px}
.subtitle{color:#aaa;font-size:0.85em;margin-bottom:18px;text-align:center}
.menu-section,.panel{width:100%;background:rgba(255,255,255,0.05);border-radius:12px;padding:14px;margin-bottom:14px}
.menu-section h2,.panel h2{margin-top:0}
.opt-grid{display:flex;flex-direction:column;gap:8px}
.inline-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.opt-btn{background:rgba(240,192,64,0.1);border:2px solid rgba(240,192,64,0.25);color:#e8e8e8;padding:12px;border-radius:10px;font-family:Georgia,serif;font-size:0.95em;cursor:pointer;transition:all 0.2s;text-align:left}
.opt-btn:hover{border-color:#f0c040;background:rgba(240,192,64,0.15)}
.opt-btn.selected{border-color:#f0c040;background:rgba(240,192,64,0.22);color:#f0c040;box-shadow:0 0 12px rgba(240,192,64,0.15)}
.opt-label{font-weight:bold}
.opt-desc{font-size:0.8em;color:#aaa;margin-top:2px}
.start-btn{width:100%;padding:14px;background:linear-gradient(135deg,#f0c040,#e0a020);color:#1a1a2e;font-family:Georgia,serif;font-size:1.1em;font-weight:bold;border:none;border-radius:12px;cursor:pointer;margin-top:10px;transition:transform 0.15s,box-shadow 0.15s}
.start-btn:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(240,192,64,0.3)}
.start-btn:disabled{opacity:0.4;cursor:default;transform:none;box-shadow:none}
.score-bar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:8px 4px;font-size:0.85em;color:#ccc;margin-bottom:4px}
.score-streak{color:#f0c040;font-weight:bold}.score-pct{color:#aaa}
svg.staff{width:100%;height:auto;margin:8px 0}
.note-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;margin:10px 0}
.note-btn{padding:12px 4px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:10px;color:#e8e8e8;font-family:Georgia,serif;font-size:1.05em;font-weight:bold;cursor:pointer;transition:all 0.2s}
.note-btn:hover{border-color:#f0c040;background:rgba(240,192,64,0.12)}
.note-btn.correct{background:rgba(34,197,94,0.25);border-color:#22c55e;color:#22c55e}
.note-btn.wrong{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:rgba(239,68,68,0.75)}
.note-btn.dimmed{opacity:0.35;pointer-events:none}.note-btn:disabled{cursor:default}
.ref-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(240,192,64,0.12);border:1.5px solid rgba(240,192,64,0.3);border-radius:8px;color:#f0c040;font-family:Georgia,serif;font-size:0.9em;cursor:pointer;transition:all 0.15s;margin:4px 0}
.ref-btn:hover{background:rgba(240,192,64,0.2)}
.mic-area{width:100%;text-align:center;margin:10px 0}
.mic-btn{padding:12px 20px;background:rgba(99,102,241,0.15);border:2px solid rgba(99,102,241,0.35);border-radius:12px;color:#a5b4fc;font-family:Georgia,serif;font-size:0.95em;cursor:pointer;transition:all 0.2s}
.mic-btn:hover{border-color:#6366f1;background:rgba(99,102,241,0.25)}
.mic-btn.recording{border-color:#ef4444;background:rgba(239,68,68,0.12);color:#fca5a5;animation:pulse-rec 1.2s infinite}
.mic-btn.connected{border-color:#22c55e;background:rgba(34,197,94,0.12);color:#86efac}
@keyframes pulse-rec{0%,100%{box-shadow:0 0 4px rgba(239,68,68,0.3)}50%{box-shadow:0 0 18px rgba(239,68,68,0.6)}}
.mic-status{margin-top:8px;font-size:0.85em;color:#a5b4fc}.mic-detected{font-size:1.25em;font-weight:bold;color:#c4b5fd;margin-top:6px}.mic-freq{font-size:0.75em;color:#888;margin-top:2px}
.rec-dot{display:inline-block;width:10px;height:10px;background:#ef4444;border-radius:50%;margin-right:6px;animation:pulse-rec 1.2s infinite}
.combo-status{width:100%;text-align:center;font-size:0.95em;margin:8px 0;color:#ccc}
.feedback{width:100%;text-align:center;padding:14px;border-radius:10px;margin:10px 0;font-size:1em;font-weight:bold}
.feedback.correct{background:rgba(34,197,94,0.15);color:#22c55e;border:1.5px solid rgba(34,197,94,0.3)}
.feedback.wrong{background:rgba(239,68,68,0.15);color:#ef4444;border:1.5px solid rgba(239,68,68,0.3)}
.nav-row{display:flex;gap:10px;width:100%;margin-top:10px}
.nav-btn{flex:1;padding:12px;border-radius:10px;font-family:Georgia,serif;font-size:0.95em;cursor:pointer;border:none;transition:all 0.15s}
.nav-btn.next{background:linear-gradient(135deg,#f0c040,#e0a020);color:#1a1a2e;font-weight:bold}.nav-btn.next:hover{transform:scale(1.02)}
.nav-btn.back{background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);color:#ccc}.nav-btn.back:hover{border-color:#f0c040;color:#f0c040}
.meta{font-size:0.78em;color:#aaa;line-height:1.45;margin-top:8px}.small{font-size:0.78em;color:#aaa}
.tuner-wrap{margin-top:10px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.04)}
.tuner-note{font-size:1.9em;font-weight:bold;color:#f0c040;text-align:center}
.tuner-sub{font-size:0.82em;color:#bbb;text-align:center;margin-top:2px}
.tuner-meter{position:relative;width:100%;height:54px;margin-top:10px}
.tuner-scale{position:absolute;left:0;right:0;top:24px;height:2px;background:rgba(255,255,255,0.2)}
.tuner-center{position:absolute;left:50%;top:14px;width:2px;height:22px;background:#f0c040;transform:translateX(-50%)}
.tuner-tick{position:absolute;top:18px;width:1px;height:12px;background:rgba(255,255,255,0.18)}
.tuner-needle{position:absolute;top:8px;width:3px;height:32px;background:#a5b4fc;border-radius:2px;left:50%;transform:translateX(-50%)}
.warning{width:100%;font-size:0.8em;color:#fca5a5;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);padding:10px;border-radius:10px;margin-top:10px;line-height:1.4}
.opt-btn,.note-btn,.ref-btn,.nav-btn,.start-btn{-webkit-tap-highlight-color:transparent;user-select:none}
.opt-btn:active,.note-btn:active,.ref-btn:active,.nav-btn:active,.start-btn:active{transform:scale(0.97)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.container>*{animation:fadeIn 0.18s ease}
.feedback{animation:fadeIn 0.22s ease}



</style>
</head>

  try {

  } catch(e) {}
}
function loadSettings() {
  try {
    var raw = localStorage.getItem('trumpetQuiz');

    var o = JSON.parse(raw);

function playTone(freq, dur) {
  var ctx = ensureAudioCtx(), t = ctx.currentTime;
  var sustain = (typeof dur === 'number' && dur > 0) ? dur : 1.6;
  var release = 0.45;
  var end = t + sustain + release;
  var master = ctx.createGain();
  master.gain.setValueAtTime(0.001, t);
  master.gain.linearRampToValueAtTime(0.28, t + 0.05);
  master.gain.linearRampToValueAtTime(0.22, t + 0.2);
  master.gain.setValueAtTime(0.22, t + sustain);
  master.gain.exponentialRampToValueAtTime(0.001, end);
  master.connect(ctx.destination);
  var harmonics = [{n:1,amp:1,type:'sawtooth'},{n:2,amp:0.58,type:'sine'},{n:3,amp:0.38,type:'sine'},{n:4,amp:0.22,type:'sine'},{n:5,amp:0.14,type:'sine'},{n:6,amp:0.08,type:'sine'}];
  for (var i=0;i<harmonics.length;i++) {
    var h = harmonics[i], f = freq * h.n;
    if (f > 15000) continue;
    var osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = h.type;
    osc.frequency.value = f;
    var amp = h.amp * 0.18;
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(amp, t + 0.04 + i * 0.008);
    g.gain.setValueAtTime(amp * 0.84, t + 0.22);
    g.gain.setValueAtTime(amp * 0.76, t + sustain);
    g.gain.exponentialRampToValueAtTime(0.001, end);
    osc.connect(g); g.connect(master); osc.start(t); osc.stop(end + 0.2);

}

  if (shouldResume) pauseListening();

    if (S.micResumeAfterReference && S.screen === 'quiz' && needsMicInQuiz() && !S.answered) {

function playScale(notes, opts) {

  opts = opts || {};

  if (!notes || !notes.length) return;
  pauseMicForReference(notes.length * gap + 1200);
  var t = 0;

function buildStaffSVG(note, feedbackColor) {

  }

function freqToMidiFloat(freq) { return 69 + 12 * Math.log2(freq / S.concertA); }
function midiToRounded(freq) { return Math.round(freqToMidiFloat(freq)); }
function centsOff(freq, targetMidi) { return Math.round(1200 * Math.log2(freq / midiToFreq(targetMidi))); }
function findWrittenNoteBySoundingMidi(midi) {
  var all = getAllSingleNotes();
  for (var i=0;i<all.length;i++) if (all[i].soundingMidi === midi) return all[i];
  return null;
}
function autoCorrelate(buf, sampleRate) {
  var size = buf.length, rms = 0;
  for (var i=0;i<size;i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / size);
  if (rms < 0.01) return -1;
  var r1=0, r2=size-1, thresh=0.2;
  for (var a=0;a<size/2;a++) if (Math.abs(buf[a]) < thresh) { r1=a; break; }
  for (var b=1;b<size/2;b++) if (Math.abs(buf[size-b]) < thresh) { r2=size-b; break; }
  var trimmed = buf.slice(r1, r2); size = trimmed.length;
  if (size < 64) return -1;
  var c = new Float32Array(size);
  for (var i2=0;i2<size;i2++) for (var j=0;j<size-i2;j++) c[i2] += trimmed[j] * trimmed[j+i2];
  var d=0;
  while (c[d] > c[d+1]) { d++; if (d >= size - 1) return -1; }
  var maxVal=-1, maxPos=-1;
  for (var i3=d;i3<size;i3++) if (c[i3] > maxVal) { maxVal = c[i3]; maxPos = i3; }
  var T0 = maxPos;
  if (T0 > 0 && T0 < size - 1) {
    var x1=c[T0-1], x2=c[T0], x3=c[T0+1], aa=(x1+x3-2*x2)/2, bb=(x3-x1)/2;
    if (aa) T0 = T0 - bb / (2 * aa);

}
function tunerNeedleLeft(cents) {
  var clamped = Math.max(-50, Math.min(50, cents));
  return 50 + (clamped / 50) * 40;
}
function renderMicDisplay(statusText, stableNow, stableTarget) {
  var el = document.getElementById('mic-detected');
  if (!el) return;

  var centsTxt = S.micDetectedFreq ? ((S.micDetectedCents > 0 ? '+' : '') + S.micDetectedCents + ' Cent') : tr('tuningWaiting');
  var ticks = '';
  for (var i=-50;i<=50;i+=10) {

  }

  if (S.micDetectedFreq) sub.push(S.micDetectedFreq + ' Hz');

  if (!S.micDetectedFreq && statusText) sub.push(statusText);

}

function detectPitch() {
  if (!S.micListening || !micAnalyser || S.micLocked) return;
  if (Date.now() < S.refPlaybackUntil) {
    micRafId = requestAnimationFrame(detectPitch);
    return;
  }

  var buf = new Float32Array(micAnalyser.fftSize);
  micAnalyser.getFloatTimeDomainData(buf);
  var freq = autoCorrelate(buf, micCtx.sampleRate);

  if (!(freq > 0 && freq > 130 && freq < 1400)) {
    S.micDetectedName = '';
    S.micDetectedWritten = '';
    S.micDetectedFreq = 0;
    S.micDetectedCents = 0;
    if (S.screen === 'setup' && S.setupTuningPhase) S.tuningStableCount = 0;
    else { S.stableCount = 0; S.lastMidi = -1; if (typeof jazzOnNoPitch === 'function') jazzOnNoPitch(); }
    renderMicDisplay(tr('tuningWaiting'));
    micRafId = requestAnimationFrame(detectPitch);
    return;
  }

  S.micDetectedFreq = Math.round(freq);

  if (S.screen === 'setup' && S.setupTuningPhase) {
    var tuningTarget = getTuningNote();
    S.micDetectedName = tuningTarget.name;
    S.micDetectedWritten = tuningTarget.display;
    S.micDetectedCents = centsOff(freq, tuningTarget.soundingMidi);
    if (Math.abs(S.micDetectedCents) <= tol().tuningCents) S.tuningStableCount++;
    else S.tuningStableCount = 0;
    renderMicDisplay(tr('tuningHold'), S.tuningStableCount, tol().tuningStable);
    if (S.tuningStableCount >= tol().tuningStable) {
      S.setupTuningPhase = false;
      S.setupTuned = true;
      pauseListening();
      render();
      return;
    }
    micRafId = requestAnimationFrame(detectPitch);
    return;
  }

  if (S.screen === 'jazz' && typeof jazzDetect === 'function') {
    if (jazzDetect(freq)) { micRafId = requestAnimationFrame(detectPitch); return; }
  }

  if (S.screen === 'tuner') {
    var sMidi = midiToRounded(freq);          // nearest sounding (concert) pitch
    var spell = chromaticSpell(sMidi);
    S.micDetectedName = spell.name;
    S.micDetectedWritten = '';
    S.micDetectedCents = centsOff(freq, sMidi);
    var writtenSpell = chromaticSpell(sMidi - TRANS[S.transposition].semitones);
    renderMicDisplay(tr('written') + ': ' + localizedNoteName(writtenSpell.name) + ' · ' + tr('octave') + ' ' + spell.octave);
    micRafId = requestAnimationFrame(detectPitch);
    return;
  }

  var midi = midiToRounded(freq);
  var mapped = findWrittenNoteBySoundingMidi(midi);

  if (mapped) {
    S.micDetectedName = mapped.name;
    S.micDetectedWritten = mapped.display;
    S.micDetectedCents = centsOff(freq, mapped.soundingMidi);
    if (midi === S.lastMidi) S.stableCount++;
    else { S.stableCount = 1; S.lastMidi = midi; }
  } else {
    S.micDetectedName = '';
    S.micDetectedWritten = '';
    S.micDetectedCents = 0;
    S.stableCount = 0;
    S.lastMidi = -1;
  }

  if (S.screen === 'quiz' && S.quizType === 'single' && S.mode !== 'click' && !S.micLocked) {
    renderMicDisplay(tr('tuningHold'), S.stableCount, tol().answerStable);
    if (mapped && S.currentNote && midi === S.currentNote.soundingMidi && Math.abs(S.micDetectedCents) <= tol().answerCents && S.stableCount >= tol().answerStable) {
      S.micLocked = true;
      S.micAnswer = mapped.name;
      S.micCorrect = (mapped.midi === S.currentNote.midi);
      pauseListening();
      if (S.mode === 'mic') handleMicOnlyAnswer();
      else checkBothDone();
      render();
      return;
    }
    micRafId = requestAnimationFrame(detectPitch);
    return;
  }

  renderMicDisplay(tr('tuningWaiting'));
  micRafId = requestAnimationFrame(detectPitch);
}

function checkBothDone() {
  if (S.mode === 'both' && S.clickAnswer !== null && S.micAnswer !== null) {
    S.answered = true;
    var ok = S.clickCorrect && S.micCorrect;
    if (ok) S.streak++; else S.streak = 0;
    S.totalCount++; if (ok) S.correctCount++;
    recordAnswer(S.currentNote, ok);
    render();
    scheduleAutoAdvance(ok);
  }
}

function setJazzStep(i) {

  S.jazzStep = Math.max(0, Math.min(S.jazzPhrase.length - 1, i));
  if (S.jazzStep > S.jazzDoneStep) S.jazzDoneStep = S.jazzStep;
  render();
}
function jazzStepBack() { setJazzStep(S.jazzStep - 1); }
function jazzStepFwd() {
  // At the last note, one more "forward" in Listen mode finishes the lesson.
  if (S.jazzStep >= S.jazzPhrase.length - 1) {

    return;

}
function jazzReplayNote() {
  var n = S.jazzPhrase[S.jazzStep];
  if (n) { pauseMicForReference(jazzGapMs() + 600); playTone(n.soundingFreq, jazzGapMs()/1000 * 0.9); }
}
var jazzPlayTimers = [];
function clearJazzTimers() { jazzPlayTimers.forEach(function(t){ clearTimeout(t); }); jazzPlayTimers = []; }
function jazzStopPhrase() { clearJazzTimers(); S.jazzPlaying = false; render(); }
function jazzPlayPhrase() {
  if (!S.jazzPhrase.length) return;
  clearJazzTimers();
  var gap = jazzGapMs();
  // In Play mode the phrase is only a reference – don't move the learner's place.
  if (S.jazzMode === 'play') {
    playScale(S.jazzPhrase, { gapMs: gap, swing: S.jazzSwing });
    return;
  }
  // Listen mode: walk the highlight through the phrase note by note, then finish.
  S.jazzPlaying = true;
  pauseMicForReference(S.jazzPhrase.length * gap + 1200);
  var t = 0;
  S.jazzPhrase.forEach(function(n, i){
    jazzPlayTimers.push(setTimeout(function(){
      S.jazzStep = i;
      if (i > S.jazzDoneStep) S.jazzDoneStep = i;
      playTone(n.soundingFreq, gap / 1000 * 0.9);
      render();
    }, t));
    t += S.jazzSwing ? ((i % 2 === 0) ? gap * 1.34 : gap * 0.66) : gap;
  });
  jazzPlayTimers.push(setTimeout(function(){
    S.jazzPlaying = false;
    S.jazzDoneStep = S.jazzPhrase.length;
    if (!S.jazzCompleted) completeJazzLesson(); else render();
  }, t + 300));
}

// ---- Lesson completion & progression ----
function completeJazzLesson() {
  if (!S.jazzLessonId) return;

}
function jazzLessonIndex() {

  return -1;
}
function jazzHasNextLesson() {

  return i >= 0 && (i + 1) < JAZZ_TRACKS[S.jazzTrack].lessons.length;
}

// ---- Play-along (microphone) detection ----
// Called from detectPitch() while on the jazz screen. Returns true when it has
// handled the frame (Play mode), false to let normal detection continue.
function jazzAdvanceAfterMatch() {
  // Timing feedback relative to the metronome, if it's running.
  if (metroTimer) {
    var bm = metroBeatMs || jazzBeatMs();
    var off = (Date.now() - metroLastClickAt) % bm;
    if (off > bm / 2) off -= bm;
    var lbl = Math.abs(off) <= 60 ? 'onbeat' : (off < 0 ? 'early' : 'late');
    S.jazzTiming = { ms: Math.round(off), label: lbl };
  }
  S.jazzMatchCount = 0;
  S.jazzOnTarget = false;
  S.jazzDoneStep = Math.max(S.jazzDoneStep, S.jazzStep + 1);
  if (S.jazzStep >= S.jazzPhrase.length - 1) {
    S.jazzWaitRelease = false;
    stopMetronome();
    pauseListening();
    completeJazzLesson();
    return;
  }
  S.jazzStep++;
  S.jazzWaitRelease = true;   // require a short silence before the next note counts
  S.jazzReleaseCount = 0;
  render();
}
function jazzDetect(freq) {
  if (S.jazzMode !== 'play' || S.jazzCompleted) return false;
  var cur = S.jazzPhrase[S.jazzStep];
  if (!cur) return false;
  var midi = midiToRounded(freq);
  var mapped = findWrittenNoteBySoundingMidi(midi);
  S.micDetectedFreq = Math.round(freq);
  S.micDetectedName = mapped ? mapped.name : '';
  S.micDetectedWritten = mapped ? mapped.display : '';
  S.micDetectedCents = centsOff(freq, cur.soundingMidi); // needle shows distance to the target
  // Gate stays closed until the player releases (silence), so a single sustained
  // tone or a repeated pitch can't roll through several notes at once.
  if (S.jazzWaitRelease) {
    S.jazzOnTarget = false;
    renderMicDisplay(tr('yourTurn'), 0, tol().answerStable);
    return true;
  }
  var onTarget = (midi === cur.soundingMidi) && (Math.abs(S.micDetectedCents) <= tol().answerCents);
  S.jazzOnTarget = onTarget;
  if (onTarget) {
    S.jazzMatchCount++;
    renderMicDisplay(tr('onTarget'), S.jazzMatchCount, tol().answerStable);
    if (S.jazzMatchCount >= tol().answerStable) jazzAdvanceAfterMatch();
  } else {
    S.jazzMatchCount = 0;
    renderMicDisplay(tr('yourTurn'), 0, tol().answerStable);
  }
  return true;
}
function jazzOnNoPitch() {
  if (S.jazzMode !== 'play') return;
  S.jazzMatchCount = 0;
  S.jazzOnTarget = false;
  if (S.jazzWaitRelease) {
    S.jazzReleaseCount++;
    if (S.jazzReleaseCount >= 3) { S.jazzWaitRelease = false; S.jazzReleaseCount = 0; }
  }
}
function jazzCountIn() {
  clearJazzTimers(); stopMetronome();
  S.jazzStep = 0; S.jazzDoneStep = 0; S.jazzCompleted = false;
  S.jazzMatchCount = 0; S.jazzWaitRelease = false; S.jazzReleaseCount = 0;
  S.jazzTiming = null; S.jazzOnTarget = false;
  var bm = jazzBeatMs();
  for (var i=0;i<4;i++) (function(idx){
    jazzPlayTimers.push(setTimeout(function(){ playClick(idx === 0); }, idx * bm));
  })(i);
  jazzPlayTimers.push(setTimeout(function(){
    if (S.screen !== 'jazz' || S.jazzMode !== 'play') return;
    startMicListening();
    if (S.metronome) startMetronome();
    render();
  }, 4 * bm));
  render();
}

  h += '<div class="opt-btn' + (S.quizType==='ear'?' selected':'') + '" onclick="selectQuizType(\'ear\')"><div class="opt-label">&#127911; ' + tr('earCard') + '</div><div class="opt-desc">' + tr('earCardDesc') + '</div></div>';
  h += '<div class="opt-btn' + (S.quizType==='jazz'?' selected':'') + '" onclick="selectQuizType(\'jazz\')"><div class="opt-label">&#127927; ' + tr('jazzCard') + '</div><div class="opt-desc">' + tr('jazzCardDesc') + '</div></div>';
  h += '<div class="opt-btn" onclick="goTuner()"><div class="opt-label">&#9201; ' + tr('tunerCard') + '</div><div class="opt-desc">' + tr('tunerCardDesc') + '</div></div>';
  h += '</div></div>';

  if (S.quizType === 'jazz') {
    h += renderJazzLessonPicker();
    h += renderSettingsPanel();
    app.innerHTML = h;
    return;
  }

  if (S.quizType === 'ear') {
    h += '<div class="menu-section"><h2>' + tr('difficulty') + '</h2><div class="opt-grid">';
    ['veryeasy','easy','medium','hard','expert'].forEach(function(d){
      h += '<div class="opt-btn' + (S.difficulty===d?' selected':'') + '" onclick="selectDifficulty(\''+d+'\')"><div class="opt-label">' + DIFF[d]['label_'+S.lang] + '</div><div class="opt-desc">' + DIFF[d]['desc_'+S.lang] + '</div></div>';
    });
    h += '</div></div>';
    h += renderStatsPanel();
    h += renderSettingsPanel();
    h += '<button class="start-btn" onclick="startEar()">' + tr('startNow') + '</button>';
    app.innerHTML = h;
    return;
  }

  h += '<div class="menu-section"><h2>' + tr('mode') + '</h2><div class="opt-grid">';
  ['click','mic','both'].forEach(function(m){
    h += '<div class="opt-btn' + (S.mode===m?' selected':'') + '" onclick="selectMode(\''+m+'\')"><div class="opt-label">' + MODES[m]['label_'+S.lang] + '</div><div class="opt-desc">' + MODES[m]['desc_'+S.lang] + '</div></div>';
  });
  h += '</div></div>';

  h += '<div class="menu-section"><h2>' + tr('difficulty') + '</h2><div class="opt-grid">';
  ['veryeasy','easy','medium','hard','expert'].forEach(function(d){
    h += '<div class="opt-btn' + (S.difficulty===d?' selected':'') + '" onclick="selectDifficulty(\''+d+'\')"><div class="opt-label">' + DIFF[d]['label_'+S.lang] + '</div><div class="opt-desc">' + DIFF[d]['desc_'+S.lang] + '</div></div>';
  });
  h += '</div></div>';

  h += renderStatsPanel();
  h += renderSettingsPanel();

  // Smart start: click-only needs no tuning, so go straight in.
  if (S.mode === 'click') {
    h += '<button class="start-btn" onclick="startQuizNow()">' + tr('startNow') + '</button>';
  } else {
    h += '<button class="start-btn" onclick="goSetup()">' + tr('tuneFirst') + '</button>';
    h += '<button class="start-btn" style="background:rgba(255,255,255,0.08);color:#ccc;margin-top:8px" onclick="startQuizNow()">' + tr('skipTuning') + '</button>';
  }
  app.innerHTML = h;
}
function renderJazzLessonPicker() {
  var h = '<div class="menu-section"><h2>' + tr('track') + '</h2><div class="inline-grid">';
  Object.keys(JAZZ_TRACKS).forEach(function(tk){
    h += '<div class="opt-btn' + (S.jazzTrack===tk?' selected':'') + '" onclick="selectJazzTrack(\''+tk+'\')"><div class="opt-label">' + JAZZ_TRACKS[tk]['name_'+S.lang] + '</div></div>';
  });
  h += '</div></div>';

  var track = JAZZ_TRACKS[S.jazzTrack];
  h += '<div class="menu-section"><h2>' + JAZZ_TRACKS[S.jazzTrack]['name_'+S.lang] + ' · ' + tr('lesson') + 's</h2>';
  h += '<div class="opt-desc" style="margin-bottom:10px">' + track['desc_'+S.lang] + '</div>';
  h += '<div class="opt-grid">';
  track.lessons.forEach(function(ls, idx){
    var unlocked = jazzLessonUnlocked(S.jazzTrack, idx);
    var doneFlag = S.jazzProgress && S.jazzProgress[ls.id];
    var badge = '';
    if (doneFlag) badge = '<span style="color:#22c55e;font-weight:bold">&#10003; ' + tr('done') + '</span>';
    else if (!unlocked) badge = '<span style="color:#888">&#128274;</span>';
    var style = unlocked ? '' : 'opacity:0.5;';
    var click = unlocked ? ('openLesson(\''+ls.id+'\')') : '';
    h += '<div class="opt-btn" style="'+style+(unlocked?'':'cursor:default')+'" '+(unlocked?'onclick="'+click+'"':'')+'>';
    h += '<div style="display:flex;justify-content:space-between;align-items:center">';
    h += '<div class="opt-label">' + tr('level') + ' ' + ls.level + ' · ' + ls['name_'+S.lang] + '</div>' + badge;
    h += '</div>';
    h += '<div class="opt-desc">' + (unlocked ? ls['desc_'+S.lang] : tr('locked')) + '</div>';
    h += '</div>';
  });
  h += '</div></div>';
  return h;
}
function renderTuningTutorial() {
  var h = '<div class="menu-section"><h2>' + tr('tuningTutorialTitle') + '</h2>';
  h += '<div class="meta" style="margin-top:0">';
  ['tuningTutorialStep1','tuningTutorialStep2','tuningTutorialStep3','tuningTutorialStep4','tuningTutorialNeedle','tuningTutorialTip'].forEach(function(k){
    h += '<div style="margin:6px 0">' + tr(k) + '</div>';
  });
  h += '</div></div>';
  return h;
}

function renderSetup(app) {
  var tuning = getTuningNote();
  var h = '<h1>' + tr('setupTitle') + '</h1>';
  h += '<div class="subtitle">' + tr('setupHint') + '</div>';
  h += renderTuningTutorial();

  h += '<div class="menu-section"><h2>' + tr('instrument') + '</h2><div class="opt-grid">';
  ['Bb','C','Eb'].forEach(function(t){
    h += '<div class="opt-btn' + (S.transposition===t?' selected':'') + '" onclick="selectTransposition(\''+t+'\')"><div class="opt-label">' + TRANS[t]['label_'+S.lang] + '</div><div class="opt-desc">' + TRANS[t]['desc_'+S.lang] + '</div></div>';
  });
  h += '</div></div>';

  h += '<div class="menu-section"><h2>' + tr('concertA') + '</h2><div class="inline-grid">';
  [440,442,443,444].forEach(function(v){
    h += '<div class="opt-btn' + (S.concertA===v?' selected':'') + '" onclick="selectConcertA(' + v + ')"><div class="opt-label">A = ' + v + ' Hz</div></div>';
  });
  h += '</div></div>';

  h += '<div class="menu-section"><h2>' + tr('tuningNote') + '</h2><div class="inline-grid">';
  [65,67,69,72].forEach(function(midi){
    var found = null;
    for (var i=0;i<BASE_NOTES.length;i++) if (BASE_NOTES[i].midi === midi) found = noteWithSoundingData(BASE_NOTES[i]);
    h += '<div class="opt-btn' + (S.tuningTargetWrittenMidi===midi?' selected':'') + '" onclick="selectTuningNote(' + midi + ')"><div class="opt-label">' + (found ? noteDisplayLabel(found) : midi) + '</div></div>';
  });
  h += '</div></div>';

  h += '<div class="feedback" style="background:rgba(99,102,241,0.12);color:#c4b5fd;border:1.5px solid rgba(99,102,241,0.3)">' +
       tr('written') + ': <strong>' + noteDisplayLabel(tuning) + '</strong> · ' + tr('sounding') + ': ' + tuning.soundingFreq.toFixed(1) + ' Hz · ' + TRANS[S.transposition]['label_'+S.lang] +
       '</div>';

  h += '<div style="text-align:center;display:flex;justify-content:center;gap:8px;flex-wrap:wrap">';
  h += '<button class="ref-btn" onclick="playRef()">' + tr('playReference') + '</button>';
  h += '<button class="ref-btn" onclick="startSetupTuning()">' + tr('tuningStartMic') + '</button>';
  h += '</div>';

  h += '<div class="mic-area"><div id="mic-detected"><div class="mic-status">' + (S.setupTuned ? tr('tuningReady') : tr('tuningWaiting')) + '</div></div></div>';
  h += '<div class="nav-row"><button class="nav-btn back" onclick="goMenu()">' + tr('backMenu') + '</button><button class="nav-btn next" onclick="beginQuiz()">' + tr('beginQuiz') + '</button></div>';
  h += '<button class="start-btn" style="background:rgba(255,255,255,0.08);color:#ccc;margin-top:10px" onclick="startQuizNow()">' + tr('skipTuning') + '</button>';

  app.innerHTML = h;
  renderMicDisplay(S.setupTuned ? tr('tuningReady') : tr('tuningWaiting'), S.tuningStableCount, tol().tuningStable);
}
function renderQuiz(app) {
  if (S.quizType === 'ear') { renderEarQuiz(app); return; }
  var promptNote = getCurrentPromptNote();
  var pct = S.totalCount > 0 ? Math.round(S.correctCount / S.totalCount * 100) : 0;
  var h = '';
  h += '<div class="score-bar"><span>' + tr('levelLabel') + ' ' + statLevel() + ' · ' + tr('round') + ' ' + S.round + '</span><span class="score-streak">' + (S.streak > 0 ? '&#128293; ' + S.streak : '') + '</span><span class="score-pct">' + S.correctCount + '/' + S.totalCount + (S.totalCount > 0 ? ' (' + pct + '%)' : '') + '</span></div>';

  var fbColor = null;
  if (S.answered) {
    var ok = S.mode === 'click' ? S.clickCorrect : (S.mode === 'mic' ? S.micCorrect : (S.clickCorrect && S.micCorrect));
    fbColor = ok ? '#22c55e' : '#ef4444';
  }
  h += buildStaffSVG(promptNote, fbColor);
  h += '<div class="small" style="text-align:center;margin-top:-2px">' + tr('instrumentShort') + ': ' + TRANS[S.transposition]['label_'+S.lang] + '</div>';

  h += '<div style="text-align:center;display:flex;justify-content:center;gap:8px;flex-wrap:wrap">';
  h += '<button class="ref-btn" onclick="playRef()">' + tr('playReference') + '</button>';
  h += '<button class="ref-btn" onclick="toggleFingering()" style="' + (S.showFingering ? 'background:rgba(240,192,64,0.25);border-color:#f0c040' : '') + '">&#9997; ' + tr('fingering') + '</button>';
  h += '</div>';

  if (S.answered) {
    h += '<div class="small" style="text-align:center">' + tr('written') + ': ' + noteDisplayLabel(promptNote) + ' · ' + tr('sounding') + ': ' + promptNote.soundingFreq.toFixed(1) + ' Hz</div>';
  } else {
    h += '<div class="small" style="text-align:center">&nbsp;</div>';
  }

  if (S.showFingering && promptNote) {
    h += '<div style="text-align:center;margin:6px 0">' + buildFingeringSVG(promptNote) + '</div>';
  }

  if (S.mode === 'both' && !S.answered) {
    h += '<div class="combo-status">' + (S.clickAnswer !== null ? '&#10003; ' + tr('clickName') : '&#9203; ' + tr('clickName')) + ' &middot; ' + (S.micAnswer !== null ? '&#10003; ' + tr('playTone') : '&#9203; ' + tr('playTone')) + '</div>';
  }

  if (S.mode === 'click' || S.mode === 'both') {
    h += '<div class="note-btns">';
    getUniqueNames().forEach(function(n){
      var cls = 'note-btn', dis = '';
      if (S.clickAnswer !== null) {
        dis = ' disabled';
        if (n === promptNote.name) cls += ' correct';
        else if (n === S.clickAnswer && !S.clickCorrect) cls += ' wrong';
        else cls += ' dimmed';
      }
      h += '<button class="' + cls + '"' + dis + ' onclick="answerClick(\'' + n + '\')">' + localizedNoteName(n) + '</button>';
    });
    h += '</div>';
  }

  if (needsMicInQuiz()) {
    h += '<div class="mic-area"><div id="mic-detected"><div class="mic-status">' + tr('micActive') + '</div></div></div>';
  }

  if (S.answered) {
    var allCorrect = S.mode === 'click' ? S.clickCorrect : (S.mode === 'mic' ? S.micCorrect : (S.clickCorrect && S.micCorrect));
    var fingLabel = (promptNote.fing || []).length === 0 ? tr('open') : tr('valve') + ' ' + promptNote.fing.join('+');
    h += '<div class="feedback ' + (allCorrect ? 'correct' : 'wrong') + '">' + (allCorrect ? '&#10003; ' + tr('correct') + ' ' : '&#10007; ' + tr('wrong') + ' ') + noteLabel(promptNote) + ' (' + noteDisplayLabel(promptNote) + ') · ' + fingLabel + '</div>';
    var nextLabel = (S.autoAdvance && S.autoAdvanceTimer) ? tr('autoNext') : tr('next');
    h += '<div class="nav-row"><button class="nav-btn back" onclick="goMenu()">' + tr('menu') + '</button><button class="nav-btn next" onclick="nextTask()">' + nextLabel + '</button></div>';
  }

  app.innerHTML = h;
  if (needsMicInQuiz()) {
    renderMicDisplay(tr('tuningHold'), S.stableCount, tol().answerStable);
  }
}

function renderJazz(app) {
  var ls = jazzCurrentLesson();
  if (!ls) { backToLessons(); return; }
  var phrase = S.jazzPhrase;
  var cur = phrase[S.jazzStep];
  var h = '';

  h += '<div class="score-bar"><span>' + JAZZ_TRACKS[S.jazzTrack]['name_'+S.lang] + ' · ' + tr('level') + ' ' + ls.level + '</span><span class="score-pct">' + (S.jazzStep+1) + ' ' + tr('phraseOf') + ' ' + phrase.length + '</span></div>';
  h += '<h2 style="text-align:center;margin:2px 0 6px">' + ls['name_'+S.lang] + '</h2>';
  h += '<div class="small" style="text-align:center;margin-bottom:4px">' + tr('instrumentShort') + ': ' + TRANS[S.transposition]['label_'+S.lang] + '</div>';

  // Mode toggle (Listen / Play).
  h += '<div class="menu-section" style="padding:8px"><div class="inline-grid">';
  h += '<div class="opt-btn' + (S.jazzMode==='listen'?' selected':'') + '" onclick="setJazzMode(\'listen\')"><div class="opt-label">&#128066; ' + tr('listenMode') + '</div></div>';
  h += '<div class="opt-btn' + (S.jazzMode==='play'?' selected':'') + '" onclick="setJazzMode(\'play\')"><div class="opt-label">&#127932; ' + tr('playMode') + '</div></div>';
  h += '</div></div>';

  // Notation of the whole phrase, with current note highlighted
  h += '<div style="margin-top:4px">' + buildPhraseNotationSVG(phrase, S.jazzStep, S.jazzDoneStep) + '</div>';
  h += renderPhraseStrip(phrase, S.jazzStep, S.jazzDoneStep, S.jazzShowNames);

  // Current note detail + fingering
  if (cur) {
    var onT = (S.jazzMode === 'play' && S.jazzOnTarget);
    var curLabel = (S.jazzMode === 'play') ? tr('yourTurn') : (tr('currentTone') + ':');
    h += '<div class="combo-status"' + (onT ? ' style="color:#22c55e"' : '') + '>' + curLabel + ' <strong>' + noteLabel(cur) + '</strong> (' + noteDisplayLabel(cur) + ')' + (onT ? ' &#10003;' : '') + '</div>';
    h += '<div style="text-align:center;margin:4px 0">' + buildFingeringSVG(cur) + '</div>';
  }

  // Microphone listening area (Play mode only)
  if (S.jazzMode === 'play') {
    h += '<div class="mic-area"><div id="mic-detected"><div class="mic-status">' + tr('micActive') + '</div></div>';
    if (!S.micConnected) h += '<button class="mic-btn" onclick="startMicListening()" style="margin-top:8px">&#127908; ' + tr('tuningStartMic') + '</button>';
    h += '</div>';
    if (!S.micConnected && S.permissionHint) h += '<div class="warning">' + S.permissionHint + '</div>';

    // Count-in + metronome controls
    h += '<div style="text-align:center;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:6px">';
    h += '<button class="ref-btn" onclick="jazzCountIn()">' + tr('countIn') + '</button>';
    h += '<button class="ref-btn" onclick="toggleMetronome()" style="' + (S.metronome ? 'background:rgba(240,192,64,0.25);border-color:#f0c040' : '') + '">&#9201; ' + tr('metronome') + ': ' + (S.metronome ? tr('on') : tr('off')) + '</button>';
    h += '</div>';
    if (S.jazzTiming) {
      var tcol = S.jazzTiming.label === 'onbeat' ? '#22c55e' : '#f0c040';
      var tlbl = S.jazzTiming.label === 'onbeat' ? tr('timingOnBeat') : (S.jazzTiming.label === 'early' ? tr('timingEarly') : tr('timingLate'));
      h += '<div class="combo-status" style="color:' + tcol + '">' + tr('timing') + ': ' + tlbl + ' (' + (S.jazzTiming.ms > 0 ? '+' : '') + S.jazzTiming.ms + ' ms)</div>';
    }
  }

  if (S.jazzCompleted) {
    h += '<div class="feedback correct">&#10003; ' + tr('lessonComplete') + '</div>';
  }

  // Controls
  h += '<div style="text-align:center;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:6px">';
  h += '<button class="ref-btn" onclick="' + (S.jazzPlaying ? 'jazzStopPhrase()' : 'jazzPlayPhrase()') + '">' + (S.jazzPlaying ? tr('stopPhrase') : tr('playPhrase')) + '</button>';
  h += '<button class="ref-btn" onclick="jazzReplayNote()">' + tr('replayNote') + '</button>';
  h += '</div>';
  h += '<div class="nav-row"><button class="nav-btn back" onclick="jazzStepBack()">' + tr('stepBack') + '</button><button class="nav-btn next" onclick="jazzStepFwd()">' + tr('stepFwd') + '</button></div>';

  if (S.jazzCompleted && jazzHasNextLesson()) {
    h += '<div class="nav-row" style="margin-top:8px"><button class="nav-btn next" onclick="jazzNextLesson()">' + tr('nextLesson') + '</button></div>';
  }

  h += '<div class="nav-row" style="margin-top:8px"><button class="nav-btn back" onclick="backToLessons()">' + tr('backToLessons') + '</button></div>';

  app.innerHTML = h;
}
function setJazzMode(m) {
  if (m === S.jazzMode) { render(); return; }
  S.jazzMode = m;
  clearJazzTimers();
  stopMetronome();
  S.jazzPlaying = false;
  S.jazzMatchCount = 0;
  S.jazzWaitRelease = false;
  S.jazzReleaseCount = 0;
  S.jazzTiming = null;
  S.jazzOnTarget = false;
  if (m === 'play') {
    // Start a fresh play-through from the first note; the unlock itself persists.
    S.jazzStep = 0;
    S.jazzDoneStep = 0;
    S.jazzCompleted = false;
    startMicListening();
  } else {
    pauseListening();
  }
  render();
}


document.addEventListener('keydown', function(e){
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if (S.screen === 'quiz') {
    if ((e.key === ' ' || e.key === 'Enter')) {
      e.preventDefault();
      if (S.answered) { clearAutoAdvance(); nextTask(); }
      else playRef();
      return;
    }
    if ((S.mode === 'click' || S.mode === 'both' || S.quizType === 'ear') && !S.answered && /^[1-9]$/.test(e.key)) {
      var names = getUniqueNames();
      var idx = parseInt(e.key, 10) - 1;
      if (idx < names.length) { answerClick(names[idx]); }
      return;
    }
    if (e.key === 'f' || e.key === 'F') { toggleFingering(); return; }
  }
});

loadSettings();
render();
window.addEventListener('beforeunload', function(){ disconnectMic(); });

if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.protocol === 'http:')) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

</script>
</body>
</html>
